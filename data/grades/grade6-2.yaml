grade: 六年级
semester: 下册
version: "v0.1"
last_updated: "2026-04-30"
textbook: "人教版"
description: "数绘 - 小学数学绘本式知识拼图"

chapters:
  - id: ch1
    title: 分数的意义和性质
    emoji: "🍭"
    color: "#a8d5ba"
    illustration: "ch1-fraction-kingdom.png"
    difficulty: 2
    unlocked: true
    progress: 78
    prerequisites: []
    sections:
      - type: basics
        title: 基础概念
        items:
          - "分数是把单位“1”平均分成若干份，表示这样的一份或几份的数"
          - "分子表示取的份数，分母表示平均分的份数"
          - "分数单位是把单位1平均分成若干份，这样的一份叫做分数单位"
          - "同分母分数可以直接比较大小"
      - type: formulas
        title: 必会公式与规律
        items:
          - "约分：分子和分母同时除以它们的公约数"
          - "最简分数：分子和分母只有公因数1的分数"
          - "通分：把异分母分数化成同分母的分数"
      - type: mistakes
        title: 常见易错点
        items:
          - "比较分数大小时直接比较分子或分母（未通分）"
          - "约分时没有除以最大公约数"
          - "带分数化假分数时漏乘整数部分"
      - type: examples
        title: 经典例题与技巧
        items:
          - "把 7/8 和 5/6 化成同分母比较大小（找最小公倍数）"
    connections:
      - target: ch2
        reason: "分数加减法必须先通分"
        strength: "strong"

  - id: ch2
    title: 分数加法和减法
    emoji: "🍪"
    color: "#f4c2c2"
    illustration: "ch2-fraction-cookies.png"
    difficulty: 3
    unlocked: false
    progress: 40
    prerequisites: ["ch1"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "同分母分数直接相加减，分子相加减，分母不变"
          - "异分母分数要先通分，再按照同分母分数计算"
          - "带分数加减法一般先化成假分数再计算"
      - type: formulas
        title: 必会公式与规律
        items:
          - "同分母分数加法：a/b + c/b = (a+c)/b"
          - "同分母分数减法：a/b - c/b = (a-c)/b"
      - type: mistakes
        title: 常见易错点
        items:
          - "异分母分数没有通分就直接相加减"
          - "带分数加减时整数部分和分数部分混在一起算"
          - "计算结果没有化成最简分数"
      - type: examples
        title: 经典例题与技巧
        items:
          - "3/4 + 5/6 = ?（先通分）"
          - "带分数加减快速方法：整数部分和分数部分分开算"
    connections:
      - target: ch3
        reason: "分数乘除法建立在加减法熟练基础上"
        strength: "strong"

  - id: ch3
    title: 分数乘法和除法
    emoji: "🌈"
    color: "#b8d4f0"
    illustration: "ch3-fraction-rainbow.png"
    difficulty: 4
    unlocked: false
    progress: 20
    prerequisites: ["ch2"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "分数乘整数 = 分子乘整数，分母不变"
          - "分数除法等于乘除数的倒数"
          - "分数乘分数 = 分子相乘，分母相乘"
      - type: formulas
        title: 必会公式与规律
        items:
          - "a/b × c/d = (a×c)/(b×d)"
          - "a/b ÷ c/d = a/b × d/c"
      - type: mistakes
        title: 常见易错点
        items:
          - "除法没有变成乘倒数"
          - "结果没有化成最简分数或带分数"
      - type: examples
        title: 经典例题与技巧
        items:
          - "3/5 × 10 = ?（先约分再乘）"
          - "除以分数 = 乘它的倒数"
    connections:
      - target: ch5
        reason: "百分数是特殊的分数"
        strength: "strong"

  - id: ch4
    title: 圆
    emoji: "⭕️"
    color: "#f7d9a8"
    illustration: "ch4-circle.png"
    difficulty: 3
    unlocked: false
    progress: 25
    prerequisites: ["ch3"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "圆的半径、直径、周长、面积"
          - "直径 = 2 × 半径"
          - "圆周率 π ≈ 3.14"
      - type: formulas
        title: 必会公式
        items:
          - "圆的周长 C = 2πr = πd"
          - "圆的面积 S = πr²"
      - type: mistakes
        title: 常见易错点
        items:
          - "半径和直径混淆"
          - "计算面积时用了直径而不是半径"
      - type: examples
        title: 经典例题
        items:
          - "半径为 5cm 的圆，面积和周长分别是多少？"
    connections:
      - target: ch7
        reason: "圆的知识在数学广角中会用到"
        strength: "medium"

  - id: ch5
    title: 百分数
    emoji: "%"
    color: "#e8b4d8"
    illustration: "ch5-percent.png"
    difficulty: 3
    unlocked: false
    progress: 30
    prerequisites: ["ch1", "ch3"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "百分数是分母为 100 的分数"
          - "百分数、分数、小数可以互化"
      - type: formulas
        title: 必会公式
        items:
          - "百分数 = 分数 × 100%"
          - "分数 = 百分数 ÷ 100%"
      - type: mistakes
        title: 常见易错点
        items:
          - "百分数化小数时点错小数点"
          - "折扣问题理解错误"
      - type: examples
        title: 经典例题
        items:
          - "一件衣服打八折，是原价的百分之几？"
    connections: []

