grade: 六年级
semester: 下册
version: "v0.1"
last_updated: "2026-04-30"
textbook: "人教版"
description: "数绘 - 小学数学绘本式知识拼图"

chapters:
  - id: ch1
    title: 分数的意义和性质
    emoji: "🍭"
    color: "#a8d5ba"
    illustration: "ch1-fraction-kingdom.png"
    difficulty: 2
    unlocked: true
    progress: 75
    prerequisites: []
    sections:
      - type: basics
        title: 基础概念
        items:
          - "分数是把单位“1”平均分成若干份，表示这样的一份或几份的数"
          - "分数的分子表示取的份数，分母表示平均分的份数"
          - "分数单位是把单位1平均分成若干份，这样的一份叫做分数单位"
          - "同分母分数可以直接比较大小，异分母分数要先通分再比较"
      - type: formulas
        title: 必会公式与规律
        items:
          - "约分：分子和分母同时除以它们的公约数"
          - "最简分数：分子和分母只有公因数1的分数"
          - "通分：把分母不同的分数化成同分母的分数"
          - "比较异分母分数大小时，先通分再比较"
      - type: mistakes
        title: 常见易错点
        items:
          - "比较分数大小时直接比较分子或分母（忘记通分）"
          - "约分时没有除以最大公约数，导致结果不是最简分数"
          - "带分数化假分数时漏乘整数部分"
      - type: examples
        title: 经典例题与技巧
        items:
          - "把 7/8 和 5/6 比较大小：找最小公倍数快速通分"
          - "约分技巧：先找分子分母的公因数，从大到小试除"
    connections:
      - target: ch2
        reason: "分数加减法必须先通分或约分"
        strength: "strong"

  - id: ch2
    title: 分数加法和减法
    emoji: "🍪"
    color: "#f4c2c2"
    illustration: "ch2-fraction-cookies.png"
    difficulty: 3
    unlocked: false
    progress: 40
    prerequisites: ["ch1"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "同分母分数相加减：分子相加减，分母不变"
          - "异分母分数相加减：先通分，再按照同分母分数计算"
          - "带分数加减法：先把带分数化成假分数再计算"
      - type: formulas
        title: 必会公式与规律
        items:
          - "同分母分数加法：a/b + c/b = (a+c)/b"
          - "同分母分数减法：a/b - c/b = (a-c)/b"
      - type: mistakes
        title: 常见易错点
        items:
          - "异分母分数没有通分就直接相加减"
          - "带分数加减时没有统一化成假分数"
          - "计算结果没有化成最简分数"
      - type: examples
        title: 经典例题与技巧
        items:
          - "3/4 + 5/6 = ?（先通分）"
          - "带分数加减快速技巧：整数部分和分数部分分别计算"
    connections:
      - target: ch3
        reason: "分数乘除法建立在加减法熟练的基础上"
        strength: "strong"

  - id: ch3
    title: 分数乘法和除法
    emoji: "🌈"
    color: "#b8d4f0"
    illustration: "ch3-fraction-rainbow.png"
    difficulty: 4
    unlocked: false
    progress: 15
    prerequisites: ["ch2"]
    sections:
      - type: basics
        title: 基础概念
        items:
          - "分数乘整数：分子乘整数，分母不变"
          - "分数除法是乘法的逆运算，除以一个数等于乘它的倒数"
      - type: formulas
        title: 必会公式与规律
        items:
          - "分数乘分数：分子相乘，分母相乘"
          - "分数除法：乘除数的倒数"
      - type: mistakes
        title: 常见易错点
        items:
          - "忘记把除法变成乘倒数"
          - "计算结果没有化成最简分数或带分数"
      - type: examples
        title: 经典例题与技巧
        items: []
    connections:
      - target: ch5
        reason: "百分数是分数的特殊形式"
        strength: "medium"
      - target: ch4
        reason: "圆的面积计算会用到分数乘法"
        strength: "weak"
